<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>甜甜今天吃什么</title>
  <style>
    :root {
      --bg: #fff5f7;
      --paper: #fffafd;
      --ink: #3f2730;
      --muted: #8b6b76;
      --line: #f1d7df;
      --green: #cc6f91;
      --green-dark: #9e4868;
      --tomato: #e97599;
      --yellow: #ffd36f;
      --blue: #9e78c9;
      --lavender: #eee4ff;
      --shadow: 0 18px 60px rgba(137, 72, 98, .16);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 7%, rgba(255, 191, 212, .5), transparent 18rem),
        radial-gradient(circle at 88% 4%, rgba(238, 228, 255, .72), transparent 16rem),
        linear-gradient(160deg, #fff6f8 0%, #fffafd 48%, #fff1df 100%);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    button:active { transform: translateY(1px) scale(.99); }

    .app {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      position: relative;
      padding: 18px 4px 12px;
    }

    .hero::after {
      content: "Tiantian only";
      position: absolute;
      right: 4px;
      top: 16px;
      padding: 6px 10px;
      border: 1px solid rgba(233, 117, 153, .28);
      border-radius: 999px;
      color: var(--green-dark);
      background: rgba(255, 250, 253, .66);
      font-size: .76rem;
      font-weight: 800;
    }

    .hero-copy h1 {
      margin: 0 0 8px;
      font-size: clamp(2.1rem, 11vw, 3.9rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.65;
    }

    .table-scene {
      display: none;
    }

    .panel {
      background: rgba(255, 250, 253, .9);
      border: 1px solid rgba(241, 215, 223, .92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .picker {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .controls,
    .result,
    .manager {
      border-radius: 20px;
      padding: 16px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.08rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.72);
      font-size: .85rem;
      white-space: nowrap;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 6px;
      margin-bottom: 14px;
      border-radius: 14px;
      background: #f7e8ef;
    }

    .segmented button {
      min-height: 44px;
      border-radius: 10px;
      color: var(--muted);
      background: transparent;
    }

    .segmented button.active {
      color: #fff;
      background: linear-gradient(135deg, #e97599, #b979d6);
      box-shadow: 0 10px 22px rgba(204, 111, 145, .24);
    }

    .field {
      display: grid;
      gap: 8px;
      margin: 10px 0;
    }

    .field label {
      color: var(--muted);
      font-size: .9rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--ink);
      background: rgba(255,255,255,.88);
      outline: none;
    }

    .native-select {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .choice-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, .74);
      font-weight: 700;
    }

    .choice-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #e97599, #b979d6);
      box-shadow: 0 10px 20px rgba(204, 111, 145, .18);
    }

    .field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .primary,
    .secondary,
    .ghost,
    .danger {
      min-height: 48px;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, #e97599, #ff9f8a);
      box-shadow: 0 12px 28px rgba(233, 117, 153, .28);
    }

    .secondary {
      color: #fff;
      background: linear-gradient(135deg, #b979d6, #e97599);
    }

    .ghost {
      color: var(--green-dark);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.66);
    }

    .danger {
      color: #9d3424;
      border: 1px solid #f0c6bd;
      background: #fff2ef;
    }

    .result {
      order: -1;
      position: relative;
      display: grid;
      align-content: start;
      min-height: 300px;
      overflow: hidden;
    }

    .result.shaking {
      animation: cardShake .42s ease both;
    }

    @keyframes cardShake {
      0%, 100% { transform: translateX(0) rotate(0); }
      18% { transform: translateX(-5px) rotate(-1deg); }
      36% { transform: translateX(5px) rotate(1deg); }
      54% { transform: translateX(-4px) rotate(-.8deg); }
      72% { transform: translateX(4px) rotate(.8deg); }
    }

    .result::before {
      content: "";
      position: absolute;
      right: -80px;
      top: -100px;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      background: rgba(255, 191, 212, .46);
    }

    .result::after {
      content: "甜";
      position: absolute;
      right: 24px;
      bottom: 20px;
      color: rgba(233, 117, 153, .12);
      font-size: 6.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .result-body {
      position: relative;
      z-index: 1;
    }

    .meal-tag {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      color: #9e4868;
      background: #ffe6ef;
      font-size: .9rem;
      font-weight: 700;
    }

    .answer {
      margin: 4px 0 10px;
      font-size: clamp(2.35rem, 13vw, 4.4rem);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .desc {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.65;
      font-size: .96rem;
    }

    .dish-choice {
      margin: 12px 0 4px;
      padding: 12px;
      border: 1px solid #f0d8b8;
      border-radius: 14px;
      color: #7b3d54;
      background: linear-gradient(135deg, #fff0f5, #fff7df);
      font-weight: 800;
      line-height: 1.5;
    }

    .shake-hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 12px;
      color: #fff;
      background: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    .history {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }

    .history h3 {
      margin: 0 0 8px;
      font-size: .95rem;
      color: var(--muted);
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .manager {
      margin-top: 14px;
    }

    .mobile-drawer-title {
      display: none;
    }

    details summary {
      cursor: pointer;
      list-style: none;
      font-weight: 800;
      min-height: 34px;
    }

    details summary::-webkit-details-marker { display: none; }

    .advanced {
      margin-top: 10px;
      padding-top: 6px;
    }

    .advanced summary {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
    }

    .store-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      max-height: 280px;
      overflow: auto;
      padding-right: 4px;
    }

    .store-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.64);
    }

    .store-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .store-item span {
      display: block;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.55;
    }

    .tiny-actions {
      display: flex;
      gap: 6px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      color: var(--green-dark);
      background: #f5efe4;
      font-weight: 800;
    }

    .notice {
      margin-top: 10px;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 560px) {
      body {
        background:
          radial-gradient(circle at 12% 0%, rgba(255, 191, 212, .48), transparent 14rem),
          radial-gradient(circle at 100% 4%, rgba(238, 228, 255, .56), transparent 12rem),
          linear-gradient(160deg, #fff6f8 0%, #fffafd 58%, #fff1df 100%);
      }

      .app { padding: 10px 12px; }
      .hero { padding: 4px 2px 8px; }
      .hero-copy h1 {
        margin-bottom: 4px;
        font-size: clamp(1.82rem, 9vw, 2.55rem);
        line-height: 1.06;
      }
      .hero-copy p {
        max-width: 320px;
        font-size: .86rem;
        line-height: 1.45;
      }
      .hero::after {
        position: static;
        display: inline-flex;
        margin-top: 8px;
        padding: 4px 8px;
        font-size: .68rem;
      }
      .controls, .result, .manager { padding: 14px; border-radius: 16px; }
      .picker { gap: 10px; }
      .result {
        order: -2;
        min-height: 0;
      }
      .result::before {
        width: 150px;
        height: 150px;
        right: -54px;
        top: -66px;
      }
      .result::after {
        font-size: 4.4rem;
        right: 18px;
        bottom: 14px;
      }
      .row { grid-template-columns: 1fr; }
      .actions > * { flex: 1 1 100%; }
      .controls {
        position: sticky;
        bottom: 8px;
        z-index: 8;
        padding-top: 10px;
      }
      .controls .section-title {
        display: none;
      }
      .mobile-drawer-title {
        display: block;
        margin: 0 0 8px;
        color: var(--muted);
        font-size: .82rem;
        font-weight: 800;
        text-align: center;
      }
      .section-title {
        align-items: center;
        flex-direction: row;
        margin-bottom: 10px;
      }
      .field label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }
      .choice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .choice-btn {
        min-height: 36px;
        padding: 7px 8px;
        font-size: .88rem;
      }
      .answer {
        margin-top: 2px;
        font-size: clamp(1.62rem, 8.3vw, 2.45rem);
      }
      .desc {
        margin-bottom: 8px;
        font-size: .88rem;
        line-height: 1.5;
      }
      .meal-tag {
        margin-bottom: 8px;
        padding: 5px 9px;
        font-size: .8rem;
      }
      .shake-hint {
        margin-top: 6px;
        font-size: .78rem;
      }
      .dish-choice {
        margin-top: 8px;
        padding: 10px;
      }
      .history { display: none; }
      .manager .actions > * { flex-basis: calc(50% - 5px); }
      .store-item { grid-template-columns: 1fr; }
      .tiny-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-copy">
        <h1>甜甜今天吃什么</h1>
        <p>甜甜专属小饭签，想认真吃饭，也想被好好投喂。</p>
      </div>
      <div class="table-scene" aria-label="温暖的餐桌插画"></div>
    </section>

    <section class="picker">
      <aside class="controls panel">
        <p class="mobile-drawer-title">选一下偏好，再摇出甜甜今天吃什么</p>
        <div class="section-title">
          <h2>甜甜想怎么选</h2>
          <span class="pill" id="clockText">正在看饭点</span>
        </div>

        <div class="segmented" role="tablist" aria-label="选择模式">
          <button id="broadMode" class="active" type="button">按想吃的</button>
          <button id="nearMode" type="button">附近挑一家</button>
        </div>

        <div class="row">
          <div class="field">
            <label for="mealSelect">饭点</label>
            <select id="mealSelect" class="native-select" tabindex="-1" aria-hidden="true">
              <option value="auto">按现在自动判断</option>
              <option value="breakfast">早餐</option>
              <option value="lunch">午餐</option>
              <option value="dinner">晚餐</option>
              <option value="any">随时都行</option>
            </select>
            <div class="choice-grid" data-choice-for="mealSelect">
              <button class="choice-btn active" type="button" data-value="auto">按现在</button>
              <button class="choice-btn" type="button" data-value="breakfast">早餐</button>
              <button class="choice-btn" type="button" data-value="lunch">午餐</button>
              <button class="choice-btn" type="button" data-value="dinner">晚餐</button>
            </div>
          </div>
          <div class="field">
            <label for="moodSelect">今天想要</label>
            <select id="moodSelect" class="native-select" tabindex="-1" aria-hidden="true">
              <option value="any">都可以</option>
              <option value="sweet">想吃甜的</option>
              <option value="pretty">精致一点</option>
              <option value="comfort">治愈舒服</option>
              <option value="warm">热乎舒服</option>
              <option value="quick">快点吃完</option>
              <option value="light">清爽一点</option>
              <option value="spicy">来点重口</option>
              <option value="local">山西本地味</option>
            </select>
            <div class="choice-grid" data-choice-for="moodSelect">
              <button class="choice-btn active" type="button" data-value="any">都可以</button>
              <button class="choice-btn" type="button" data-value="sweet">想吃甜的</button>
              <button class="choice-btn" type="button" data-value="pretty">精致一点</button>
              <button class="choice-btn" type="button" data-value="comfort">治愈舒服</button>
              <button class="choice-btn" type="button" data-value="light">清爽一点</button>
              <button class="choice-btn" type="button" data-value="warm">热乎舒服</button>
            </div>
          </div>
        </div>

        <div id="nearFields" class="hidden">
          <div class="actions">
            <button class="ghost" id="locateBtn" type="button">用当前位置</button>
          </div>
          <details class="advanced">
            <summary>手动坐标</summary>
            <div class="row">
              <div class="field">
                <label for="latInput">纬度</label>
                <input id="latInput" inputmode="decimal" value="37.8706" aria-label="纬度">
              </div>
              <div class="field">
                <label for="lngInput">经度</label>
                <input id="lngInput" inputmode="decimal" value="112.5489" aria-label="经度">
              </div>
            </div>
          </details>
        </div>

        <div class="actions">
          <button class="primary" id="pickBtn" type="button">摇一摇 / 点一下</button>
          <button class="secondary" id="againBtn" type="button">换个甜甜会爱的</button>
        </div>
      </aside>

      <section class="result panel" aria-live="polite">
        <div class="result-body">
          <span class="meal-tag" id="mealTag">午餐建议</span>
          <h2 class="answer" id="answerTitle">等甜甜摇一下</h2>
          <p class="desc" id="answerDesc">会按饭点、心情和当前位置，挑一个更像甜甜会喜欢的答案。</p>
          <p class="shake-hint" id="shakeHint">点一次按钮开启后，晃晃手机也能随机。</p>
          <div class="dish-choice hidden" id="dishChoice"></div>
          <div class="meta" id="metaTags"></div>
          <a class="map-link hidden" id="mapLink" target="_blank" rel="noopener">去地图看看</a>

          <div class="history">
            <h3>刚才给甜甜抽到过</h3>
            <div class="history-list" id="historyList">
              <span class="pill">还没有记录</span>
            </div>
          </div>
        </div>
      </section>
    </section>

    <section class="manager panel">
      <details>
        <summary>维护我的菜单</summary>
        <div class="row">
          <div class="field">
            <label for="typeInput">类型</label>
            <select id="typeInput">
              <option value="store">太原餐厅</option>
              <option value="broad">泛泛品类</option>
            </select>
          </div>
          <div class="field">
            <label for="nameInput">名称</label>
            <input id="nameInput" placeholder="例如：刀削面 / 并州饭店">
          </div>
        </div>
        <div class="row" id="storeOnlyFields">
          <div class="field">
            <label for="districtInput">区域/地址提示</label>
            <input id="districtInput" placeholder="例如：迎泽区 / 亲贤街附近">
          </div>
          <div class="field">
            <label for="coordInput">坐标</label>
            <input id="coordInput" placeholder="纬度,经度，可不填">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="mealsInput">适合饭点</label>
            <input id="mealsInput" placeholder="breakfast,lunch,dinner 或 any">
          </div>
          <div class="field">
            <label for="tagsInput">标签</label>
            <input id="tagsInput" placeholder="local,warm,quick">
          </div>
        </div>
        <div class="field">
          <label for="noteInput">一句备注</label>
          <textarea id="noteInput" placeholder="写一点你自己的判断，比如招牌菜、适合场景、避雷提醒"></textarea>
        </div>
        <div class="field">
          <label for="dishesInput">推荐吃什么</label>
          <textarea id="dishesInput" placeholder="用逗号隔开，例如：牛肉刀削面加卤蛋，番茄鸡蛋面，过油肉拌面"></textarea>
        </div>
        <div class="actions">
          <button class="secondary" id="saveBtn" type="button">保存</button>
          <button class="ghost" id="exportBtn" type="button">导出</button>
          <button class="ghost" id="importBtn" type="button">导入</button>
          <button class="danger" id="resetBtn" type="button">恢复内置</button>
        </div>
        <input id="fileInput" class="hidden" type="file" accept="application/json">
        <p class="notice">维护内容保存在当前浏览器的 localStorage。换浏览器或清缓存前，可以先导出备份。</p>
        <div class="store-list" id="storeList"></div>
      </details>
    </section>
  </main>

  <script>
    const TAIYUAN_CENTER = { lat: 37.8706, lng: 112.5489 };

    const seedBroad = [
      { id: "b1", name: "麻辣烫", meals: ["lunch", "dinner"], tags: ["spicy", "quick", "warm"], note: "热乎、自由、纠结时很好收场。", dishes: ["牛肉丸+宽粉+油麦菜+豆皮", "番茄汤底加肥牛和土豆片", "麻辣拌少汤，多放海带结"] },
      { id: "b2", name: "刀削面", meals: ["breakfast", "lunch", "dinner"], tags: ["local", "quick", "warm"], note: "山西胃的默认答案，浇头决定今天的情绪。", dishes: ["牛肉刀削面加卤蛋", "番茄鸡蛋刀削面", "过油肉拌刀削面"] },

      { id: "s35", name: "柳巷奶茶甜点", district: "柳巷商圈", lat: 37.8695, lng: 112.5689, meals: ["any"], tags: ["sweet", "quick", "pretty"], note: "逛街顺手的快乐，适合补一点甜。", dishes: ["半糖奶茶+蛋挞", "水果茶+烤冷面", "芋泥奶茶+小贝"] },
      { id: "s36", name: "晋阳街Brunch", district: "晋阳街/南中环周边", lat: 37.7908, lng: 112.5476, meals: ["breakfast", "lunch"], tags: ["pretty", "light"], note: "适合周末慢一点吃，拍照和饱腹都照顾。", dishes: ["牛油果吐司+咖啡", "班尼迪克蛋", "酸奶碗+可颂"] },
      { id: "s37", name: "学府街甜辣小吃", district: "学府街/高校周边", lat: 37.8074, lng: 112.5798, meals: ["lunch", "dinner"], tags: ["sweet", "spicy", "quick"], note: "学生区选择多，适合炸鸡、年糕、米线这类快乐食物。", dishes: ["韩式炸鸡", "芝士年糕", "麻辣米线+奶茶"] },
      { id: "s38", name: "长风商务区泰式", district: "长风商务区", lat: 37.8121, lng: 112.5469, meals: ["lunch", "dinner"], tags: ["pretty", "light"], note: "想吃酸甜清爽、香料感一点时可以搜这个方向。", dishes: ["冬阴功汤粉", "青柠鸡饭", "泰式海鲜沙拉"] },
      { id: "s39", name: "亲贤街烘焙", district: "亲贤街商圈", lat: 37.8211, lng: 112.5532, meals: ["breakfast", "any"], tags: ["sweet", "quick", "pretty"], note: "早上或下午的小确幸，适合甜甜的轻补给。", dishes: ["可颂+拿铁", "碱水面包+酸奶", "肉松小贝+美式"] },
      { id: "s40", name: "万达广场简餐甜品", district: "龙湖万达/杏花岭方向", lat: 37.8904, lng: 112.5602, meals: ["lunch", "dinner", "any"], tags: ["pretty", "sweet", "quick"], note: "商场里选择安全，正餐和甜品可以一起解决。", dishes: ["牛肉饭+水果茶", "寿司手卷", "蛋糕+咖啡"] },
      { id: "s41", name: "南中环轻食", district: "南中环/高新区", lat: 37.7892, lng: 112.5696, meals: ["lunch", "dinner"], tags: ["light", "pretty"], note: "想清爽、少负担时适合搜附近轻食。", dishes: ["鸡胸肉藜麦饭", "金枪鱼沙拉", "牛肉卷+无糖茶"] },
      { id: "s42", name: "甜甜的夜宵小摊", district: "就近夜宵街/商圈", lat: 37.8706, lng: 112.5489, meals: ["dinner"], tags: ["comfort", "sweet", "spicy"], note: "晚一点不想正经吃饭，就让夜宵负责开心。", dishes: ["烤冷面+奶茶", "炸串+酸梅汤", "韩式炸鸡+年糕"] }
      ];

    const state = {
      mode: "broad",
      editingId: null,
      history: [],
      dishHistory: [],
      broad: load("eatPickerBroad", seedBroad),
      stores: load("eatPickerStores", seedStores)
    };

    const $ = (id) => document.getElementById(id);

    const elements = {
      broadMode: $("broadMode"),
      nearMode: $("nearMode"),
      nearFields: $("nearFields"),
      mealSelect: $("mealSelect"),
      moodSelect: $("moodSelect"),
      pickBtn: $("pickBtn"),
      againBtn: $("againBtn"),
      locateBtn: $("locateBtn"),
      latInput: $("latInput"),
      lngInput: $("lngInput"),
      mealTag: $("mealTag"),
      answerTitle: $("answerTitle"),
      answerDesc: $("answerDesc"),
      shakeHint: $("shakeHint"),
      dishChoice: $("dishChoice"),
      metaTags: $("metaTags"),
      mapLink: $("mapLink"),
      historyList: $("historyList"),
      clockText: $("clockText"),
      typeInput: $("typeInput"),
      nameInput: $("nameInput"),
      districtInput: $("districtInput"),
      coordInput: $("coordInput"),
      mealsInput: $("mealsInput"),
      tagsInput: $("tagsInput"),
      noteInput: $("noteInput"),
      dishesInput: $("dishesInput"),
      storeOnlyFields: $("storeOnlyFields"),
      saveBtn: $("saveBtn"),
      exportBtn: $("exportBtn"),
      importBtn: $("importBtn"),
      resetBtn: $("resetBtn"),
      fileInput: $("fileInput"),
      storeList: $("storeList")
    };

    let shakeEnabled = false;
    let lastShakeAt = 0;

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return structuredClone(fallback);
        return mergeSeed(JSON.parse(raw), fallback);
      } catch (error) {
        return structuredClone(fallback);
      }
    }

    function mergeSeed(saved, fallback) {
      if (!Array.isArray(saved)) return structuredClone(fallback);
      const byId = new Map(saved.map((item) => [item.id, item]));
      const merged = saved.map((item) => {
        const seed = fallback.find((entry) => entry.id === item.id);
        return seed ? { ...seed, ...item, dishes: item.dishes || seed.dishes || [] } : item;
      });
      fallback.forEach((item) => {
        if (!byId.has(item.id)) merged.push(structuredClone(item));
      });
      return merged;
    }

    function persist() {
      localStorage.setItem("eatPickerBroad", JSON.stringify(state.broad));
      localStorage.setItem("eatPickerStores", JSON.stringify(state.stores));
    }

    function currentMeal() {
      const selected = elements.mealSelect.value;
      if (selected !== "auto") return selected;
      const hour = new Date().getHours();
      if (hour < 10) return "breakfast";
      if (hour < 15) return "lunch";
      if (hour < 22) return "dinner";
      return "any";
    }

    function mealName(meal) {
      return ({ breakfast: "早餐", lunch: "午餐", dinner: "晚餐", any: "随时" })[meal] || "这顿";
    }

    function setMode(mode) {
      state.mode = mode;
      elements.broadMode.classList.toggle("active", mode === "broad");
      elements.nearMode.classList.toggle("active", mode === "near");
      elements.nearFields.classList.toggle("hidden", mode !== "near");
    }

    function setupChoiceGroups() {
      document.querySelectorAll("[data-choice-for]").forEach((group) => {
        const select = document.getElementById(group.dataset.choiceFor);
        if (!select) return;
        group.addEventListener("click", (event) => {
          const button = event.target.closest(".choice-btn");
          if (!button) return;
          select.value = button.dataset.value;
          group.querySelectorAll(".choice-btn").forEach((item) => {
            item.classList.toggle("active", item === button);
          });
          select.dispatchEvent(new Event("change"));
        });
      });
    }

    function distanceKm(a, b) {
      const rad = Math.PI / 180;
      const dLat = (b.lat - a.lat) * rad;
      const dLng = (b.lng - a.lng) * rad;
      const lat1 = a.lat * rad;
      const lat2 = b.lat * rad;
      const h = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 6371 * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function matches(item, meal, mood) {
      const mealOk = meal === "any" || item.meals.includes("any") || item.meals.includes(meal);
      const moodOk = mood === "any" || item.tags.includes(mood);
      return mealOk && moodOk;
    }

    function weightedRandom(items, origin) {
      if (!origin) return items[Math.floor(Math.random() * items.length)];
      const weighted = items.map((item) => {
        const dist = item.lat && item.lng ? distanceKm(origin, item) : 8;
        return { item, dist, weight: Math.max(.18, 1 / (0.8 + dist)) };
      });
      const total = weighted.reduce((sum, x) => sum + x.weight, 0);
      let cursor = Math.random() * total;
      for (const entry of weighted) {
        cursor -= entry.weight;
        if (cursor <= 0) return { ...entry.item, distance: entry.dist };
      }
      return { ...weighted[0].item, distance: weighted[0].dist };
    }

    function isSpecificMeal(item) {
      return /饭|米线|米粉|面|粉|馍|包|云吞|馄饨|凉皮|香锅|冒菜/.test(item.name);
    }

    function broadRandom(items) {
      const weighted = items.map((item) => ({
        item,
        weight: isSpecificMeal(item) ? 1.35 : 1
      }));
      const total = weighted.reduce((sum, entry) => sum + entry.weight, 0);
      let cursor = Math.random() * total;
      for (const entry of weighted) {
        cursor -= entry.weight;
        if (cursor <= 0) return entry.item;
      }
      return weighted[0].item;
    }

    function avoidRecent(items) {
      if (items.length <= 1) return items;
      const recent = new Set(state.history.slice(0, Math.min(8, Math.max(2, Math.floor(items.length * 0.45)))));
      const fresh = items.filter((item) => !recent.has(item.name));
      return fresh.length ? fresh : items;
    }

    function chooseDish(dishes) {
      const clean = dishes.filter(Boolean);
      if (!clean.length) return "";
      const recent = new Set(state.dishHistory.slice(0, 10));
      const fresh = clean.filter((dish) => !recent.has(dish));
      const pool = fresh.length ? fresh : clean;
      const dish = pool[Math.floor(Math.random() * pool.length)];
      state.dishHistory.unshift(dish);
      state.dishHistory = [...new Set(state.dishHistory)].slice(0, 16);
      return dish;
    }

    function playShakeFeedback() {
      const resultCard = document.querySelector(".result");
      if (!resultCard) return;
      resultCard.classList.remove("shaking");
      void resultCard.offsetWidth;
      resultCard.classList.add("shaking");
    }

    function pick() {
      const meal = currentMeal();
      const mood = elements.moodSelect.value;
      const source = state.mode === "broad" ? state.broad : state.stores;
      let pool = source.filter((item) => matches(item, meal, mood));
      if (!pool.length) pool = source.filter((item) => meal === "any" || item.meals.includes(meal));
      if (!pool.length) pool = source;
      pool = avoidRecent(pool);

      const origin = state.mode === "near"
        ? { lat: Number(elements.latInput.value) || TAIYUAN_CENTER.lat, lng: Number(elements.lngInput.value) || TAIYUAN_CENTER.lng }
        : null;
      const item = state.mode === "near" ? weightedRandom(pool, origin) : broadRandom(pool);
      playShakeFeedback();
      renderResult(item, meal);
    }

    function onDeviceMotion(event) {
      if (!shakeEnabled) return;
      const acc = event.accelerationIncludingGravity || event.acceleration;
      if (!acc) return;
      const strength = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
      const now = Date.now();
      if (strength > 28 && now - lastShakeAt > 950) {
        lastShakeAt = now;
        pick();
      }
    }

    async function enableShake() {
      if (shakeEnabled) return;
      if (!("DeviceMotionEvent" in window)) {
        elements.shakeHint.textContent = "这个浏览器不支持摇一摇，点按钮也可以随机。";
        return;
      }
      try {
        if (typeof DeviceMotionEvent.requestPermission === "function") {
          const permission = await DeviceMotionEvent.requestPermission();
          if (permission !== "granted") {
            elements.shakeHint.textContent = "没有开启体感权限，点按钮也可以随机。";
            return;
          }
        }
        window.addEventListener("devicemotion", onDeviceMotion, { passive: true });
        shakeEnabled = true;
        elements.shakeHint.textContent = "摇一摇已开启，晃晃手机就能替甜甜决定。";
      } catch (error) {
        elements.shakeHint.textContent = "摇一摇暂时不可用，点按钮也可以随机。";
      }
    }

    function renderResult(item, meal) {
      elements.mealTag.textContent = `${mealName(meal)}建议`;
      elements.answerTitle.textContent = item.name;
      elements.answerDesc.textContent = item.note || "这个答案看起来很稳。";
      const dishes = Array.isArray(item.dishes) ? item.dishes.filter(Boolean) : [];
      if (dishes.length) {
        elements.dishChoice.textContent = `具体吃：${chooseDish(dishes)}`;
        elements.dishChoice.classList.remove("hidden");
      } else {
        elements.dishChoice.classList.add("hidden");
      }
      elements.metaTags.innerHTML = "";

      const tags = [];
      if (item.district) tags.push(item.district);
      if (typeof item.distance === "number") tags.push(`约 ${item.distance.toFixed(1)} km`);
      tags.push(...item.tags.map(tagText));
      tags.forEach((tag) => {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = tag;
        elements.metaTags.appendChild(span);
      });

      if (state.mode === "near") {
        const query = encodeURIComponent(`太原 ${item.name}`);
        elements.mapLink.href = `https://ditu.amap.com/search?query=${query}`;
        elements.mapLink.classList.remove("hidden");
      } else {
        elements.mapLink.classList.add("hidden");
      }

      state.history.unshift(item.name);
      state.history = [...new Set(state.history)].slice(0, 8);
      renderHistory();
    }

    function tagText(tag) {
      return ({
        sweet: "甜甜会爱",
        pretty: "精致一点",
        comfort: "治愈舒服",
        local: "本地味",
        warm: "热乎",
        quick: "省时间",
        light: "清爽",
        spicy: "重口"
      })[tag] || tag;
    }

    function renderHistory() {
      elements.historyList.innerHTML = "";
      if (!state.history.length) {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = "还没有记录";
        elements.historyList.appendChild(span);
        return;
      }
      state.history.forEach((name) => {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = name;
        elements.historyList.appendChild(span);
      });
    }

    function renderList() {
      const all = [
        ...state.stores.map((item) => ({ ...item, type: "store" })),
        ...state.broad.map((item) => ({ ...item, type: "broad" }))
      ];
      elements.storeList.innerHTML = "";
      all.forEach((item) => {
        const row = document.createElement("div");
        row.className = "store-item";
        row.innerHTML = `
          <div>
            <strong>${escapeHtml(item.name)}</strong>
            <span>${item.type === "store" ? escapeHtml(item.district || "太原餐厅") : "泛泛品类"} · ${item.meals.map(mealName).join("、")} · ${item.tags.map(tagText).join("、")}</span>
            <span>${escapeHtml(item.note || "")}</span>
            <span>${Array.isArray(item.dishes) && item.dishes.length ? `推荐：${escapeHtml(item.dishes.slice(0, 3).join(" / "))}` : ""}</span>
          </div>
          <div class="tiny-actions">
            <button class="icon-button" type="button" title="编辑" data-action="edit" data-id="${item.id}" data-type="${item.type}">改</button>
            <button class="icon-button" type="button" title="删除" data-action="delete" data-id="${item.id}" data-type="${item.type}">删</button>
          </div>
        `;
        elements.storeList.appendChild(row);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function parseList(value, fallback) {
      const list = value.split(",").map((x) => x.trim()).filter(Boolean);
      return list.length ? list : fallback;
    }

    function saveItem() {
      const type = elements.typeInput.value;
      const target = type === "store" ? state.stores : state.broad;
      const name = elements.nameInput.value.trim();
      if (!name) {
        elements.nameInput.focus();
        return;
      }
      const coord = elements.coordInput.value.split(",").map((x) => Number(x.trim()));
      const item = {
        id: state.editingId || `${type}-${Date.now()}`,
        name,
        meals: parseList(elements.mealsInput.value, ["any"]),
        tags: parseList(elements.tagsInput.value, ["local"]),
        note: elements.noteInput.value.trim(),
        dishes: parseList(elements.dishesInput.value.replaceAll("，", ","), [])
      };
      if (type === "store") {
        item.district = elements.districtInput.value.trim() || "太原";
        if (Number.isFinite(coord[0]) && Number.isFinite(coord[1])) {
          item.lat = coord[0];
          item.lng = coord[1];
        }
      }
      const index = target.findIndex((entry) => entry.id === item.id);
      if (index >= 0) target[index] = item;
      else target.unshift(item);
      state.editingId = null;
      clearForm();
      persist();
      renderList();
    }

    function clearForm() {
      elements.nameInput.value = "";
      elements.districtInput.value = "";
      elements.coordInput.value = "";
      elements.mealsInput.value = "";
      elements.tagsInput.value = "";
      elements.noteInput.value = "";
      elements.dishesInput.value = "";
      elements.saveBtn.textContent = "保存";
    }

    function editItem(type, id) {
      const target = type === "store" ? state.stores : state.broad;
      const item = target.find((entry) => entry.id === id);
      if (!item) return;
      state.editingId = id;
      elements.typeInput.value = type;
      elements.nameInput.value = item.name;
      elements.districtInput.value = item.district || "";
      elements.coordInput.value = item.lat && item.lng ? `${item.lat},${item.lng}` : "";
      elements.mealsInput.value = item.meals.join(",");
      elements.tagsInput.value = item.tags.join(",");
      elements.noteInput.value = item.note || "";
      elements.dishesInput.value = Array.isArray(item.dishes) ? item.dishes.join("，") : "";
      elements.saveBtn.textContent = "保存修改";
      toggleStoreFields();
      elements.nameInput.focus();
    }

    function deleteItem(type, id) {
      const targetName = type === "store" ? "stores" : "broad";
      state[targetName] = state[targetName].filter((entry) => entry.id !== id);
      persist();
      renderList();
    }

    function toggleStoreFields() {
      elements.storeOnlyFields.classList.toggle("hidden", elements.typeInput.value !== "store");
    }

    function exportData() {
      const data = JSON.stringify({ broad: state.broad, stores: state.stores }, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "今天吃什么备份.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (Array.isArray(data.broad)) state.broad = data.broad;
          if (Array.isArray(data.stores)) state.stores = data.stores;
          persist();
          renderList();
        } catch (error) {
          alert("导入失败，文件格式看起来不对。");
        }
      };
      reader.readAsText(file);
    }

    function updateClock() {
      const meal = currentMeal();
      const now = new Date();
      elements.clockText.textContent = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")} · ${mealName(meal)}`;
    }

    elements.broadMode.addEventListener("click", () => setMode("broad"));
    elements.nearMode.addEventListener("click", () => setMode("near"));
    elements.pickBtn.addEventListener("click", async () => {
      await enableShake();
      pick();
    });
    elements.againBtn.addEventListener("click", pick);
    elements.mealSelect.addEventListener("change", updateClock);
    elements.typeInput.addEventListener("change", toggleStoreFields);
    elements.saveBtn.addEventListener("click", saveItem);
    elements.exportBtn.addEventListener("click", exportData);
    elements.importBtn.addEventListener("click", () => elements.fileInput.click());
    elements.fileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) importData(file);
      event.target.value = "";
    });
    elements.resetBtn.addEventListener("click", () => {
      if (!confirm("确定恢复内置数据吗？当前手动维护的内容会被覆盖。")) return;
      state.broad = structuredClone(seedBroad);
      state.stores = structuredClone(seedStores);
      persist();
      renderList();
    });
    elements.locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        alert("当前浏览器不支持定位，先用太原市中心坐标。");
        return;
      }
      navigator.geolocation.getCurrentPosition((pos) => {
        elements.latInput.value = pos.coords.latitude.toFixed(6);
        elements.lngInput.value = pos.coords.longitude.toFixed(6);
        pick();
      }, () => {
        alert("没有拿到定位，先用太原市中心坐标。");
      }, { enableHighAccuracy: true, timeout: 8000 });
    });
    elements.storeList.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const { action, id, type } = button.dataset;
      if (action === "edit") editItem(type, id);
      if (action === "delete") deleteItem(type, id);
    });

    updateClock();
    setupChoiceGroups();
    setInterval(updateClock, 30000);
    renderHistory();
    renderList();
  </script>
</body>
</html>
